---
- name: "Prepare common task test host"
  hosts: "all"
  gather_facts: true
  vars_files:
    - "vars.yml"
  vars:
    _molecule_common_fixture_root: "/tmp/archivematica-upgrade-molecule"
    _molecule_common_fixture_bin: "{{ _molecule_common_fixture_root }}/bin"
    _molecule_common_fixture_key: "{{ _molecule_common_fixture_root }}/archivematica-test-key.asc"
    _molecule_common_fixture_http_port: 18080
    _molecule_common_fixture_ss_fail_once: "{{ _molecule_common_fixture_root }}/fail-ss-aip-count-once"
    _molecule_common_apt_source_file: "/etc/apt/sources.list.d/archivematica-molecule.list"
    _molecule_common_service_units:
      - "archivematica-dashboard"
      - "archivematica-mcp-client"
      - "archivematica-mcp-server"
      - "archivematica-storage-service"
      - "gearman-job-server"
      - "nginx"
  tasks:
    - name: "Reset common task coverage events"
      ansible.builtin.file:
        path: "{{ _molecule_common_coverage_file }}"
        state: "absent"
      become: false
      delegate_to: "localhost"

    - name: "Create common task fixture directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: "directory"
        owner: "root"
        group: "root"
        mode: "0755"
      loop:
        - "{{ _molecule_common_fixture_root }}"
        - "{{ _molecule_common_fixture_bin }}"
        - "{{ _molecule_common_fixture_root }}/processingMCPConfigs"
        - "/etc/init.d"
        - "/etc/systemd/system"
        - "/var/archivematica/sharedDirectory/currentlyProcessing"
        - "/var/archivematica/sharedDirectory/watchedDirectories/SIPCreation/completedTransfers"
        - "/var/archivematica/sharedDirectory/watchedDirectories/uploadDIP"

    - name: "Create processing configuration fixture"
      ansible.builtin.copy:
        content: "<processingMCP />\n"
        dest: "{{ _molecule_common_fixture_root }}/processingMCPConfigs/defaultProcessingMCP.xml"
        owner: "root"
        group: "root"
        mode: "0644"

    - name: "Create local Archivematica apt key fixture"
      ansible.builtin.copy:
        content: |
          -----BEGIN PGP PUBLIC KEY BLOCK-----
          Version: Molecule fixture

          molecule-local-archivematica-apt-key
          -----END PGP PUBLIC KEY BLOCK-----
        dest: "{{ _molecule_common_fixture_key }}"
        owner: "root"
        group: "root"
        mode: "0644"

    - name: "Create Archivematica apt source fixture directory"
      ansible.builtin.file:
        path: "{{ _molecule_common_apt_source_file | dirname }}"
        state: "directory"
        owner: "root"
        group: "root"
        mode: "0755"
      when: ansible_distribution == "Ubuntu"

    - name: "Create Archivematica apt source fixture"
      ansible.builtin.copy:
        content: "deb http://packages.archivematica.org/1.18.x/ubuntu noble main\n"
        dest: "{{ _molecule_common_apt_source_file }}"
        owner: "root"
        group: "root"
        mode: "0644"
      when: ansible_distribution == "Ubuntu"

    - name: "Install service unit fixtures"
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ item }}.service"
        owner: "root"
        group: "root"
        mode: "0644"
        content: |
          [Unit]
          Description=Molecule fixture for {{ item }}

          [Service]
          Type=simple
          ExecStart=/usr/bin/sleep infinity

          [Install]
          WantedBy=multi-user.target
      loop: "{{ _molecule_common_service_units }}"

    - name: "Install Storage Service init fixture"
      ansible.builtin.copy:
        dest: "/etc/init.d/archivematica-storage-service"
        owner: "root"
        group: "root"
        mode: "0755"
        content: |
          #!/bin/sh
          marker="/tmp/archivematica-storage-service.started"
          case "$1" in
            start)
              touch "$marker"
              ;;
            stop)
              rm -f "$marker"
              ;;
            status)
              test -f "$marker"
              exit $?
              ;;
          esac

    - name: "Reset Storage Service retry marker"
      ansible.builtin.file:
        path: "{{ _molecule_common_fixture_ss_fail_once }}"
        state: "absent"

    - name: "Install MySQL command fixture"
      ansible.builtin.copy:
        dest: "{{ _molecule_common_fixture_bin }}/mysql"
        owner: "root"
        group: "root"
        mode: "0755"
        content: |
          #!/bin/sh
          args="$*"
          case "$args" in
            *"archivematica_upgrade_dashboard_application_state"*)
              printf '%s\n' '{"premis_agent":{},"atom_configuration":{},"system_users":[]}'
              ;;
            *"archivematica_upgrade_storage_service_application_state"*)
              printf '%s\n' '{"pipelines":[],"spaces":[],"locations":[],"system_users":[]}'
              ;;
            *"SELECT COUNT(*) FROM Jobs WHERE currentStep IN (1, 3);"*)
              printf '0\n'
              ;;
            *)
              printf '0\n'
              ;;
          esac

    - name: "Install GPG command fixture"
      ansible.builtin.copy:
        dest: "{{ _molecule_common_fixture_bin }}/gpg"
        owner: "root"
        group: "root"
        mode: "0755"
        content: |
          #!/bin/sh
          output=""
          input=""
          while [ "$#" -gt 0 ]; do
            case "$1" in
              --output)
                shift
                output="$1"
                ;;
              --*)
                ;;
              *)
                input="$1"
                ;;
            esac
            shift
          done
          cp "$input" "$output"

    - name: "Install service command fixture"
      ansible.builtin.copy:
        dest: "{{ _molecule_common_fixture_bin }}/service"
        owner: "root"
        group: "root"
        mode: "0755"
        content: |
          #!/bin/sh
          case "$1" in
            --status-all)
              printf ' [ + ]  archivematica-dashboard.service\n'
              printf ' [ + ]  archivematica-mcp-client.service\n'
              printf ' [ + ]  archivematica-mcp-server.service\n'
              printf ' [ + ]  archivematica-storage-service.service\n'
              printf ' [ + ]  gearman-job-server.service\n'
              printf ' [ + ]  nginx.service\n'
              ;;
            archivematica-storage-service)
              case "$2" in
                start|status)
                  exit 0
                  ;;
              esac
              ;;
          esac

    - name: "Install HTTP API fixture"
      ansible.builtin.copy:
        dest: "{{ _molecule_common_fixture_root }}/fixture-http.py"
        owner: "root"
        group: "root"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import json
          import os
          import sys
          from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import parse_qs, urlparse

          class Handler(BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  return

              def send_json(self, payload):
                  body = json.dumps(payload).encode("utf-8")
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def do_GET(self):
                  parsed = urlparse(self.path)
                  if parsed.path == "/GPG-KEY-archivematica":
                      with open(sys.argv[2], "rb") as key_file:
                          body = key_file.read()
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                      return
                  if parsed.path == "/api/v2/file/":
                      query = parse_qs(parsed.query)
                      status = query.get("status", [""])[0]
                      if not status and os.path.exists(sys.argv[3]):
                          os.unlink(sys.argv[3])
                          self.send_response(503)
                          self.end_headers()
                          return
                      total = {"UPLOADED": 2, "DEL_REQ": 1}.get(status, 3)
                      self.send_json({"meta": {"total_count": total}})
                      return
                  if parsed.path == "/aips/_count":
                      self.send_json({"count": 3})
                      return
                  if parsed.path == "/aipfiles/_count":
                      self.send_json({"count": 6})
                      return
                  if parsed.path == "/transfers/_count":
                      self.send_json({"count": 2})
                      return
                  if parsed.path == "/transferfiles/_count":
                      self.send_json({"count": 4})
                      return
                  self.send_json({})

              def do_POST(self):
                  parsed = urlparse(self.path)
                  if parsed.path == "/aips/_search":
                      self.send_json({
                          "hits": {"total": {"value": 3}},
                          "aggregations": {"total": {"value": 42.0}},
                      })
                      return
                  if parsed.path == "/aipfiles/_search":
                      self.send_json({"hits": {"total": {"value": 6}}})
                      return
                  self.send_json({})

          port = int(sys.argv[1])
          ThreadingHTTPServer(("127.0.0.1", port), Handler).serve_forever()

    - name: "Stop stale HTTP API fixture"
      ansible.builtin.command:
        argv:
          - "pkill"
          - "-f"
          - "{{ _molecule_common_fixture_root }}/fixture-http.py"
      changed_when: false
      failed_when: false

    - name: "Start HTTP API fixture"
      ansible.builtin.command:
        argv:
          - "/usr/bin/python3"
          - "{{ _molecule_common_fixture_root }}/fixture-http.py"
          - "{{ _molecule_common_fixture_http_port | string }}"
          - "{{ _molecule_common_fixture_key }}"
          - "{{ _molecule_common_fixture_ss_fail_once }}"
      async: 86400
      poll: 0
      changed_when: false

    - name: "Wait for HTTP API fixture"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ _molecule_common_fixture_http_port }}"
        timeout: 10

    - name: "Create temporary Elasticsearch user fixture"
      ansible.builtin.user:
        name: "molecule-es6"
        system: true
        create_home: false
        shell: "/usr/sbin/nologin"
