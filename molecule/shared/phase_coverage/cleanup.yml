---
- name: "Clean up phase coverage fixture host"
  hosts: "all"
  gather_facts: false
  vars_files:
    - "vars.yml"
  tasks:
    - name: "Stop phase coverage HTTP fixtures"
      ansible.builtin.shell: |
        set -o errexit -o nounset -o pipefail
        pkill -f "{{ _phase_coverage_fixture_root }}/[p]hase_fixture_http.py" || true
      args:
        executable: "/bin/bash"
      changed_when: false
      failed_when: false
      ignore_unreachable: true

    - name: "Remove phase coverage fixture root"
      ansible.builtin.file:
        path: "{{ _phase_coverage_fixture_root }}"
        state: "absent"
      ignore_unreachable: true
