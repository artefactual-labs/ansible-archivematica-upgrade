---
- name: "Seed prepared state for reindex checks"
  ansible.builtin.include_tasks: "seed-prepared-state.yml"

- name: "Load prepared state for reindex checks"
  ansible.builtin.include_tasks: "load-state.yml"

- name: "Simulate Elasticsearch 8 installer handoff for reindex checks"
  ansible.builtin.include_tasks: "simulate-installer-handoff.yml"

- name: "Start temporary Elasticsearch fixture for reindex checks"
  ansible.builtin.command:
    argv:
      - "{{ _phase_coverage_fixture_root }}/phase_fixture_http.py"
      - "9500"
      - "{{ _phase_coverage_fixture_root }}"
      - "{{ _archivematica_upgrade_es6_dir }}"
  async: 86400
  poll: 0
  changed_when: false

- name: "Enable missing after-upgrade index marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/missing-index"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex rejects missing after-upgrade indices"
  block:
    - name: "Run perform-reindex with missing after-upgrade index"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts missing after-upgrade index"
      ansible.builtin.fail:
        msg: "perform-reindex accepted missing after-upgrade index"
  rescue:
    - name: "Require missing after-upgrade index failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'after-upgrade' in (ansible_failed_result.msg | default(''))"

- name: "Reset reindex fixture markers and state"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ _phase_coverage_fixture_root }}/missing-index"
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-counts.json"
    - "{{ _archivematica_upgrade_reindex_task_ids_file }}"

- name: "Enable non-empty after-upgrade index marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/after-upgrade-nonempty"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex rejects non-empty after-upgrade indices"
  block:
    - name: "Run perform-reindex with non-empty after-upgrade index"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts non-empty after-upgrade index"
      ansible.builtin.fail:
        msg: "perform-reindex accepted non-empty after-upgrade index"
  rescue:
    - name: "Require non-empty after-upgrade index failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'must be empty' in (ansible_failed_result.msg | default(''))"

- name: "Reset non-empty marker"
  ansible.builtin.file:
    path: "{{ _phase_coverage_fixture_root }}/after-upgrade-nonempty"
    state: "absent"

- name: "Write invalid persisted reindex task IDs"
  ansible.builtin.copy:
    content: '{"unexpected": 1}'
    dest: "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    owner: "root"
    group: "root"
    mode: "0640"

- name: "Verify reindex rejects invalid persisted task IDs"
  block:
    - name: "Run perform-reindex with invalid persisted task IDs"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts invalid persisted task IDs"
      ansible.builtin.fail:
        msg: "perform-reindex accepted invalid task IDs"
  rescue:
    - name: "Require invalid task ID failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'task IDs are invalid' in (ansible_failed_result.msg | default(''))"

- name: "Write obsolete persisted reindex task IDs"
  ansible.builtin.copy:
    content: '{"aips": "fixture:aips"}'
    dest: "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    owner: "root"
    group: "root"
    mode: "0640"

- name: "Enable obsolete task marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/obsolete-task"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex rejects obsolete persisted task IDs"
  block:
    - name: "Run perform-reindex with obsolete persisted task ID"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts obsolete persisted task ID"
      ansible.builtin.fail:
        msg: "perform-reindex accepted obsolete task ID"
  rescue:
    - name: "Require obsolete task ID failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'no longer valid' in (ansible_failed_result.msg | default(''))"

- name: "Reset obsolete task marker and task IDs"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ _phase_coverage_fixture_root }}/obsolete-task"
    - "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-counts.json"

- name: "Enable missing submitted task marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/submit-missing-task"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex rejects submissions without task IDs"
  block:
    - name: "Run perform-reindex with missing submission task ID"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts missing submission task ID"
      ansible.builtin.fail:
        msg: "perform-reindex accepted missing submission task ID"
  rescue:
    - name: "Require missing submission task ID failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'did not return' in (ansible_failed_result.msg | default(''))"

- name: "Reset submit marker"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ _phase_coverage_fixture_root }}/submit-missing-task"
    - "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-counts.json"

- name: "Write task IDs for no-response poll branch"
  ansible.builtin.copy:
    content: '{"aips": "fixture:aips", "aipfiles": "fixture:aipfiles"}'
    dest: "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    owner: "root"
    group: "root"
    mode: "0640"

- name: "Enable task-without-response marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/task-no-response"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex rejects completed task without response"
  block:
    - name: "Run perform-reindex with completed task missing response"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts completed task without response"
      ansible.builtin.fail:
        msg: "perform-reindex accepted missing task response"
  rescue:
    - name: "Require missing task response failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'did not return a completed response' in (ansible_failed_result.msg | default(''))"

- name: "Reset task-no-response marker"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ _phase_coverage_fixture_root }}/task-no-response"
    - "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-counts.json"

- name: "Write task IDs for task-error poll branch"
  ansible.builtin.copy:
    content: '{"aips": "fixture:aips", "aipfiles": "fixture:aipfiles"}'
    dest: "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    owner: "root"
    group: "root"
    mode: "0640"

- name: "Enable task-error marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/task-error"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex reports failed Elasticsearch tasks"
  block:
    - name: "Run perform-reindex with failed task response"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex hides failed task response"
      ansible.builtin.fail:
        msg: "perform-reindex hid failed task response"
  rescue:
    - name: "Require failed task response diagnostics"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'remote-reindex task' in (ansible_failed_result.msg | default(''))"
          - "'failed' in (ansible_failed_result.msg | default(''))"
          - "'fixture remote reindex task error' in (ansible_failed_result.msg | default(''))"
          - "'content_too_long_exception' in (ansible_failed_result.msg | default(''))"

- name: "Reset task-error marker"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ _phase_coverage_fixture_root }}/task-error"
    - "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-counts.json"

- name: "Enable reindex failure marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/reindex-failure"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex rejects failed Elasticsearch responses"
  block:
    - name: "Run perform-reindex with failed response"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts failed response"
      ansible.builtin.fail:
        msg: "perform-reindex accepted failed response"
  rescue:
    - name: "Require failed response failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'failed or timed-out' in (ansible_failed_result.msg | default(''))"

- name: "Reset reindex failure marker"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ _phase_coverage_fixture_root }}/reindex-failure"
    - "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-counts.json"

- name: "Enable after-upgrade mismatch marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/after-upgrade-mismatch"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Verify reindex rejects after-upgrade count mismatches"
  block:
    - name: "Run perform-reindex with after-upgrade count mismatch"
      ansible.builtin.include_tasks: "run-migration-file.yml"
      vars:
        _phase_coverage_migration_file: "perform-reindex"

    - name: "Fail when reindex accepts after-upgrade count mismatch"
      ansible.builtin.fail:
        msg: "perform-reindex accepted after-upgrade count mismatch"
  rescue:
    - name: "Require after-upgrade count mismatch failure"
      ansible.builtin.assert:
        that:
          - ansible_failed_result is defined
          - "'do not match' in (ansible_failed_result.msg | default(''))"

- name: "Reset after-upgrade mismatch marker"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-mismatch"
    - "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    - "{{ _phase_coverage_fixture_root }}/after-upgrade-counts.json"

- name: "Write valid persisted reindex task IDs"
  ansible.builtin.copy:
    content: '{"aips": "fixture:aips", "aipfiles": "fixture:aipfiles"}'
    dest: "{{ _archivematica_upgrade_reindex_task_ids_file }}"
    owner: "root"
    group: "root"
    mode: "0640"

- name: "Enable after-upgrade counts match before-upgrade marker"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/after-upgrade-counts-match-before-upgrade"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Run perform-reindex with valid persisted task IDs"
  ansible.builtin.include_tasks: "run-migration-file.yml"
  vars:
    _phase_coverage_migration_file: "perform-reindex"
