---
- name: "Enable capped Elasticsearch 8 search total fixture"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/es8-search-total-cap"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Run check-readiness phase with capped search fixture"
  ansible.builtin.include_tasks: "run-role-phase.yml"
  vars:
    _phase_coverage_phase: "check-readiness"

- name: "Run prepare phase with capped search fixture"
  ansible.builtin.include_tasks: "run-role-phase.yml"
  vars:
    _phase_coverage_phase: "prepare"

- name: "Run cutover-before-install phase with capped search fixture"
  ansible.builtin.include_tasks: "run-role-phase.yml"
  vars:
    _phase_coverage_phase: "cutover-before-install"

- name: "Simulate installer handoff to Elasticsearch 8 with capped search fixture"
  ansible.builtin.include_tasks: "simulate-installer-handoff.yml"

- name: "Run cutover-after-install phase with capped search fixture"
  ansible.builtin.include_tasks: "run-role-phase.yml"
  vars:
    _phase_coverage_phase: "cutover-after-install"

- name: "Run migrate phase with capped search fixture"
  ansible.builtin.include_tasks: "run-role-phase.yml"
  vars:
    _phase_coverage_phase: "migrate"

- name: "Enable missing transfer index fixture before validation"
  ansible.builtin.copy:
    content: ""
    dest: "{{ _phase_coverage_fixture_root }}/missing-transfer-indices"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Run validate phase with capped search and missing transfer index fixtures"
  ansible.builtin.include_tasks: "run-role-phase.yml"
  vars:
    _phase_coverage_phase: "validate"

- name: "Run cleanup phase retaining rollback data after capped search fixture"
  ansible.builtin.include_tasks: "run-role-phase.yml"
  vars:
    _phase_coverage_phase: "cleanup"
    archivematica_upgrade_remove_rollback_data_confirmed: false
