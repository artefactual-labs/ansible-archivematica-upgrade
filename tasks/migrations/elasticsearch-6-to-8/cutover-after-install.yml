---
- name: "Require packaged Elasticsearch 6 removal"
  ansible.builtin.stat:
    path: "{{ _archivematica_upgrade_es6_system_removed_checkpoint }}"
  register: "_archivematica_upgrade_es6_removed_checkpoint"

- name: "Fail when packaged Elasticsearch 6 removal is incomplete"
  ansible.builtin.assert:
    that:
      - _archivematica_upgrade_es6_removed_checkpoint.stat.exists
    fail_msg: "The packaged Elasticsearch 6 removal checkpoint is missing."

- name: "Wait for packaged Elasticsearch 8"
  ansible.builtin.uri:
    url: "{{ _archivematica_upgrade_after_upgrade_es_url }}/_cluster/health?wait_for_status=yellow&timeout=60s"
    return_content: true
  register: "_archivematica_upgrade_es8_health"
  until:
    - _archivematica_upgrade_es8_health.status == 200
    - not (_archivematica_upgrade_es8_health.json.timed_out | default(false) | bool)
  retries: 12
  delay: 5

- name: "Read packaged Elasticsearch 8 version"
  ansible.builtin.uri:
    url: "{{ _archivematica_upgrade_after_upgrade_es_url }}"
    return_content: true
  register: "_archivematica_upgrade_es8_response"

- name: "Require packaged Elasticsearch 8"
  ansible.builtin.assert:
    that:
      - >-
        _archivematica_upgrade_es8_response.json.version.number
        is version(_archivematica_upgrade_es_after_upgrade_min_version, '>=')
      - >-
        _archivematica_upgrade_es8_response.json.version.number
        is version(_archivematica_upgrade_es_after_upgrade_max_version, '<')
    fail_msg: "The Archivematica installation automation did not install Elasticsearch 8."
