---
- name: "Require completed Elasticsearch reindexing"
  ansible.builtin.stat:
    path: "{{ _archivematica_upgrade_reindexed_checkpoint }}"
  register: "_archivematica_upgrade_reindexed_checkpoint_state"

- name: "Fail when Elasticsearch reindexing is incomplete"
  ansible.builtin.assert:
    that:
      - _archivematica_upgrade_reindexed_checkpoint_state.stat.exists
    fail_msg: "Run the migrate phase successfully before validation."

- name: "Require temporary Elasticsearch 6 to be stopped"
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ _archivematica_upgrade_es6_port }}"
    state: "stopped"
    timeout: 1
