---
- name: "Require Elasticsearch restore backup manifest metadata"
  ansible.builtin.assert:
    that:
      - _archivematica_upgrade_restore_backup_manifest.before_upgrade_es_version | default('') is match('^6[.]')
    fail_msg: >-
      The backup manifest is missing the before-upgrade Elasticsearch 6 version needed
      by this restore-backup-check phase.
