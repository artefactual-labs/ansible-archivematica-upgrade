---
name: Molecule compatibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  molecule-compatibility:
    name: Molecule ${{ matrix.platform }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            make_target: "molecule-test-ubuntu2204"
            coverage_name: "ubuntu2204"
          - platform: "rockylinux-9"
            make_target: "molecule-test-rockylinux9"
            coverage_name: "rockylinux9"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run compatibility Molecule scenario
        run: make ${{ matrix.make_target }}

      - name: Capture compatibility coverage summary
        if: always()
        run: |
          mkdir -p coverage
          if [ -f .ansible/molecule/common-task-coverage.jsonl ]; then
            make molecule-coverage > coverage/${{ matrix.coverage_name }}-coverage.json
          fi

      - name: Upload compatibility coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: molecule-${{ matrix.coverage_name }}-coverage
          path: |
            coverage/${{ matrix.coverage_name }}-coverage.json
            .ansible/molecule/common-task-coverage.jsonl
          if-no-files-found: ignore
