---
name: Molecule common

on:
  pull_request:
    paths:
      - "defaults/**"
      - "meta/**"
      - "tasks/common/**"
      - "tasks/migrations/**"
      - "vars/**"
      - "molecule/common/**"
      - "molecule/shared/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/molecule-common.yml"
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  molecule-common:
    name: Molecule common
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run common Molecule scenario
        run: make molecule-test

      - name: Capture common coverage summary
        if: always()
        run: |
          mkdir -p coverage
          if [ -f .ansible/molecule/common-task-coverage.jsonl ]; then
            make molecule-coverage > coverage/common-coverage.json
          fi

      - name: Upload common coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: molecule-common-coverage
          path: |
            coverage/common-coverage.json
            .ansible/molecule/common-task-coverage.jsonl
          if-no-files-found: ignore
